<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Galerie d'images</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .gallery img {
            width: 150px;
            height: 100px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        /* Image agrandie */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
        }

        .modal img {
            margin-top: 5%;
            max-width: 80%;
            max-height: 80%;
            border-radius: 15px;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>📸 Ma Galerie</h1>

<div class="gallery">
    <img src="https://picsum.photos/300/200?1" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?2" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?3" onclick="openModal(this.src)">
    <img src="https://picsum.photos/300/200?4" onclick="openModal(this.src)">
</div>

<!-- Fenêtre d'image -->
<div id="modal" class="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img id="modalImg">
</div>

<script>
    function openModal(src) {
        document.getElementById("modal").style.display = "block";
        document.getElementById("modalImg").src = src;
    }

    function closeModal() {
        document.getElementById("modal").style.display = "none";
    }
</script>

</body>
</html>
