<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Galerie d'art</title>

<style>

#caption {
    margin-top: 10px;
    font-size: 18px;
    color: #ddd;
}
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    text-align: center;
}

h1 {
    margin: 20px;
}
h2 {
    margin-top: 40px;
    font-size: 24px;
    opacity: 0.9;
}

/* Galerie */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.gallery img:hover {
    transform: scale(1.08);
    filter: brightness(1.2);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    inset: 0;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.modal img {
    max-width: 85%;
    max-height: 75%;
    border-radius: 20px;
    animation: zoom 0.3s ease;
}

/* Animation zoom */
@keyframes zoom {
    from {
        transform: scale(0.7);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

/* Boutons */
.controls {
    margin-top: 15px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: #ffffff22;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

button:hover {
    background: #ffffff55;
}

/* Croix */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 35px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Ma Galerie</h1>

<h2>Mes peintures</h2>
<div class="gallery">
    <img src="art/Peinture1.jpeg" onclick="openModal(0)">
    <img src="art/Peinture2.jpeg" onclick="openModal(1)">
    <img src="art/Peinture3.jpeg" onclick="openModal(2)">
    <img src="art/Peinture 4.jpeg" onclick="openModal(3)">
    <img src="art/Peinture5.jpeg" onclick="openModal(4)">
    <img src="art/Peinture6.jpeg" onclick="openModal(5)">


    
</div>

<h2>Mes dessins</h2>
<div class="gallery">
    <img src="art/image1.jpeg" onclick="openModal(6)">
    <img src="art/image2.jpeg" onclick="openModal(7)">
    <img src="art/image3.jpeg" onclick="openModal(8)">
    <img src="art/image4.jpeg" onclick="openModal(9)">
    <img src="art/image5.jpeg" onclick="openModal(10)">
    <img src="art/image6.jpeg" onclick="openModal(11)">
    <img src="art/image7.jpeg" onclick="openModal(12)">
</div>
<div id="modal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="modalImg">
    <p id="caption"></p>

    <div class="controls">
        <button onclick="prev()">⬅️</button>
        <button onclick="next()">➡️</button>
    </div>
</div>

<script>
const images = [
        {
        src: "art/Peinture1.jpeg",
        text: "Peinture originale inspirée par Antoni Gaudí."
    },
    {
        src: "art/Peinture2.jpeg",
        text: "Champ de lavandes."
    },
    {
        src: "art/Peinture3.jpeg",
        text: "Des tournesols."
    },
     {
        src: "art/Peinture 4.jpeg",
        text: "Une montagne paisible faite au doigt"
    },
    {
        src: "art/Peinture5.jpeg",
        text: "Copie de Grand bouquel dans un vase japonais d'après Odilon Redon"
    },
        {
        src: "art/Peinture6.jpeg",
        text: "Reproduction d'un tableau dont je ne parviens plus à retrouver le nom."
    },
     {
        src: "art/image1.jpeg",
        text: "Guerrière sur dinosaure."
    },
     {
        src: "art/image2.jpeg",
        text: "Église."
    },
     {
        src: "art/image3.jpeg",
        text: "Église."
    },
     {
        src: "art/image4.jpeg",
        text: "Une amie."
    },
     {
        src: "art/image5.jpeg",
        text: "Un acteur."
    },
     {
        src: "art/image6.jpeg",
        text: "Un autre acteur."
    },
     {
        src: "art/image7.jpeg",
        text: "Un oiseau."
    },
];

let current = 0;

function updateImage() {
    document.getElementById("modalImg").src = images[current].src;
    document.getElementById("caption").innerText = images[current].text;
}

function openModal(index) {
    current = index;
    document.getElementById("modal").style.display = "flex";
    updateImage();
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function next() {
    current = (current + 1) % images.length;
    updateImage();
}

function prev() {
    current = (current - 1 + images.length) % images.length;
    updateImage();
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
    if (e.key === "Escape") closeModal();
});
</script>

</body>
</html>
